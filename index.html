<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Carte de visite virtuelle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="profile-image">
                <img src="votre-photo.jpg" alt="Photo de profil">
            </div>
            <h1>Andriantiana RAKOTOSOA</h1>
            <p>Data Analyst</p>
        </div>
        
        <div class="content">
            <!-- WhatsApp / Téléphone -->
            <a href="https://wa.me/261324379977" class="info-item whatsapp" target="_blank">
                <div class="icon">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <div class="info-text">
                    <h3>WhatsApp / Téléphone</h3>
                    <p>+261 32 43 799 77</p>
                </div>
                <span class="action-hint">Cliquer pour chatter →</span>
            </a>
            
            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/andriantiana-rakotosoa-936738148/" class="info-item linkedin" target="_blank">
                <div class="icon"> 
                    <i class="fa-brands fa-linkedin-in"></i> 
                </div>
                <div class="info-text">
                    <h3>LinkedIn</h3>
                    <p>Andriantiana Rakotosoa</p>
                </div>
                <span class="action-hint">Voir le profil →</span>
            </a>
            
            <!-- Email -->
            <a href="mailto:rakotosoa.tiana@yahoo.fr" class="info-item email">
                <div class="icon">
                    <i class="far fa-envelope"></i>
                </div>
                <div class="info-text">
                    <h3>Email</h3>
                    <p>rakotosoa.tiana@yahoo.fr</p>
                </div>
                <span class="action-hint">Envoyer un message →</span>
            </a>
        </div>
        
        <div class="footer">
            <div class="qr-codes-container">
                <div class="qr-code-item">
                    <div class="qr-code small-qr">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://andriantiana.github.io/andriantianarakotosoa.github.io" 
                     alt="QR Code carte">
                    </div>
                    <p>Ma carte web</p>
                </div>
        
                <div class="qr-code-divider"></div>
        
                <div class="qr-code-item">
                    <div class="qr-code small-qr">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://andriantiana.github.io/andriantianarakotosoa.github.io/contact.vcf" 
                        alt="QR Code vCard">
                    </div>
                    <p>Télécharger le contact</p>
                </div>
                <p>Ajouter aux contacts</p>
            </div>
        </div>
    </div>
</body>
</html>
